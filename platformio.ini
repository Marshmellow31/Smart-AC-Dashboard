; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
; AsyncWebServer + IRremoteESP8266 + SinricPro exceed the default 1.3MB app
; partition; min_spiffs gives ~1.9MB app + ~190KB filesystem (UI + configs).
board_build.partitions = min_spiffs.csv
extra_scripts = pre:tools/gzip_data.py
lib_deps =
    crankyoldgit/IRremoteESP8266 @ ^2.8.6
    esp32async/ESPAsyncWebServer @ ^3.11.2
    esp32async/AsyncTCP @ ^3.4.10
    bblanchon/ArduinoJson @ ^7.4.3
    sinricpro/SinricPro @ ^3.5.1
    mobizt/Firebase Arduino Client Library for ESP8266 and ESP32 @ ^4.4.14
