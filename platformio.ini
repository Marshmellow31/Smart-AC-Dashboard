; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
; Decodes crash backtraces into file:line so panics are readable in the monitor.
monitor_filters = esp32_exception_decoder, default
board_build.filesystem = littlefs
; Custom single-app layout: ~2.5MB app + ~1.4MB filesystem. The stock
; min_spiffs table gives only ~128KB of filesystem, which the web UI fills
; completely, leaving no room for /cfg configs. See partitions.csv.
board_build.partitions = partitions.csv
extra_scripts = pre:tools/gzip_data.py
lib_deps =
    crankyoldgit/IRremoteESP8266 @ ^2.8.6
    esp32async/ESPAsyncWebServer @ ^3.11.2
    esp32async/AsyncTCP @ ^3.4.10
    bblanchon/ArduinoJson @ ^7.4.3
    sinricpro/SinricPro @ ^3.5.1
    homespan/HomeSpan @ ^1.9.1
